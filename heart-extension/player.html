<!DOCTYPE html>
<html>
<head>
    <title>ASMR FOCUS PLAYER</title>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #fbbf24;
            font-family: monospace;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            border: 2px solid #fbbf24;
        }
        .header {
            background: #fbbf24;
            color: #000;
            padding: 5px 10px;
            font-weight: bold;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        #player-wrapper {
            flex: 1;
            background: #111;
            min-height: 0;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <div class="header">
        <span id="video-title">INITIALIZING...</span>
        <span>🎧 FOCUS MODE</span>
    </div>
    <div id="player-wrapper">
        <!-- iframe injected here by player.js -->
    </div>
    <script src="player.js"></script>
</body>
</html>
