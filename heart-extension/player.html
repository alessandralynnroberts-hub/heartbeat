<!DOCTYPE html>
<html>
<head>
    <title>ASMR FOCUS PLAYER</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fbbf24;
            font-family: monospace;
            overflow: hidden;
            border: 2px solid #fbbf24;
            box-sizing: border-box;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #fbbf24;
            color: #000;
            padding: 4px 8px;
            font-weight: bold;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            user-select: none;
        }
        #player-wrapper {
            flex: 1;
            background: #000;
            position: relative;
        }
        #player-target {
            width: 100%;
            height: 100%;
        }
        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>
    <div class="header">
        <span id="video-title">INITIALIZING...</span>
        <span>FOCUS MODE</span>
    </div>
    <div id="player-wrapper">
        <div id="player-target"></div>
        <div id="loading-overlay" class="overlay">
            LOADING ASMR FOCUS...
        </div>
    </div>
    <script src="player.js"></script>
</body>
</html>
